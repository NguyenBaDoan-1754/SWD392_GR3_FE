location /api/ {
    # 1. Quan trọng: Thêm dòng này để Nginx gửi đúng domain khi handshake SSL
    proxy_ssl_server_name on; 
    
    # 2. Trỏ tới backend
    proxy_pass https://swd392-gr3-be.onrender.com;

    # 3. Chuyển tiếp các header cần thiết
    proxy_set_header Host swd392-gr3-be.onrender.com; # Đổi $host thành domain thật của backend
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}