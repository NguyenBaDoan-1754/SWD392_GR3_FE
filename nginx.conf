server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cấu hình API Proxy (đã sửa lỗi SSL từ log trước của bạn)
    location /api/ {
        proxy_ssl_server_name on; 
        proxy_pass https://swd392-gr3-be.onrender.com;
        proxy_set_header Host swd392-gr3-be.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cấu hình cho Single Page Application (React/Vite)
    location / {
        try_files $uri $uri/ /index.html;
    }
}